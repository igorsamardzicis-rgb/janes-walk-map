<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jane's Walk Map</title>
  <style>
    :root {
      --border: #d9d9d9;
      --text: #222;
      --muted: #666;
      --bg: #fff;
      --soft: #f7f7f7;
      --accent: #0b57d0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }

    .intro {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.45;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: end;
    }

    button {
      min-height: 42px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .results-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: 12px 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    #map {
      width: 100%;
      height: 460px;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 18px;
      background: var(--soft);
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--soft);
    }

    th, td {
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid #ececec;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      font-size: 13px;
      font-weight: 700;
    }

    tbody tr:hover,
    tbody tr.active-row {
      background: #f3f8ff;
    }

    .walk-link {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
      font-weight: 700;
      background: none;
      border: 0;
      padding: 0;
      min-height: auto;
    }

    .empty {
      padding: 24px 16px;
      color: var(--muted);
    }

    .mobile-cards {
      display: none;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 17px;
    }

    .card p {
      margin: 4px 0;
      font-size: 14px;
    }

    .status {
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .filters {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 14px;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      #map {
        height: 360px;
      }

      .table-wrap {
        display: none;
      }

      .mobile-cards {
        display: grid;
      }

      .results-bar {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Jane's Walk Map</h1>
    <p class="intro">Browse walks on the map or use the filters below. Click a walk name in the list to zoom to its pin on the map.</p>

    <div id="status" class="status">Loading walks...</div>

    <div class="filters" aria-label="Walk filters">
      <div class="field">
        <label for="searchInput">Search by walk name</label>
        <input id="searchInput" type="text" placeholder="Type a walk name" />
      </div>

      <div class="field">
        <label for="dateFilter">Date</label>
        <select id="dateFilter">
          <option value="">All dates</option>
        </select>
      </div>

      <div class="field">
        <label for="neighbourhoodFilter">Neighbourhood</label>
        <select id="neighbourhoodFilter">
          <option value="">All neighbourhoods</option>
        </select>
      </div>

      <div class="actions">
        <button id="resetBtn" type="button">Reset filters</button>
        <button id="showAllBtn" class="primary" type="button">Show all pins</button>
      </div>
    </div>

    <div class="results-bar">
      <div id="resultCount">0 walks</div>
      <div>Tip: tap a walk name below to open it on the map.</div>
    </div>

    <div id="map" aria-label="Map of Jane's Walk locations"></div>

    <div class="table-wrap">
      <table aria-label="List of walks">
        <thead>
          <tr>
            <th>Walk Name</th>
            <th>Date</th>
            <th>Time</th>
            <th>Neighbourhood</th>
            <th>Walk Page</th>
          </tr>
        </thead>
        <tbody id="walkTableBody"></tbody>
      </table>
      <div id="emptyTable" class="empty" style="display:none;">No walks match your filters.</div>
    </div>

    <div id="mobileCards" class="mobile-cards"></div>
  </div>

<script>
  const DATA_URL = 'https://script.google.com/macros/s/AKfycbzNyRqrftCnDaxXuMk_lV5kOdyqucar5yDn_eJT7gwgsQL9ltqMjRy6exyD5L4grwru7Q/exec';
  const GOOGLE_MAPS_API_KEY = 'AIzaSyAO0OrBnbW_lnszGr6N8rojaJ1CWuaWd8M';

  let map;
  let infoWindow;
  let allWalks = [];
  let filteredWalks = [];
  let markers = [];
  let activeRowId = null;
  function formatDate(value) {
  if (!value) return '';

  const date = new Date(value);

  return date.toLocaleDateString('en-CA', {
    month: 'long',
    day: 'numeric'
  });
}

function formatTime(value) {
  if (!value) return '';

  const date = new Date(value);

  return date.toLocaleTimeString('en-CA', {
    hour: 'numeric',
    minute: '2-digit'
  });
}
  
  const statusEl = document.getElementById('status');
  const resultCountEl = document.getElementById('resultCount');
  const tableBody = document.getElementById('walkTableBody');
  const emptyTable = document.getElementById('emptyTable');
  const mobileCards = document.getElementById('mobileCards');

  const searchInput = document.getElementById('searchInput');
  const dateFilter = document.getElementById('dateFilter');
  const neighbourhoodFilter = document.getElementById('neighbourhoodFilter');
  const resetBtn = document.getElementById('resetBtn');
  const showAllBtn = document.getElementById('showAllBtn');

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function normalizeWalk(raw) {
    return {
      id: String(raw.id ?? ''),
      walk_name: String(raw.walk_name ?? '').trim(),
      date: String(raw.date ?? '').trim(),
      time: String(raw.time ?? '').trim(),
      neighbourhood: String(raw.neighbourhood ?? '').trim(),
      walk_url: String(raw.walk_url ?? '').trim(),
      lat: Number(raw.lat),
      lng: Number(raw.lng)
    };
  }

  function isValidWalk(walk) {
    return walk.walk_name && Number.isFinite(walk.lat) && Number.isFinite(walk.lng);
  }

  function populateFilterOptions() {
    const preferredDates = ['May 1', 'May 2', 'May 3'];
    const preferredNeighbourhoods = ['Etobicoke', 'Scarborough', 'North York', 'Downtown'];

    const dates = [...new Set(allWalks.map(w => w.date).filter(Boolean))];
    const neighbourhoods = [...new Set(allWalks.map(w => w.neighbourhood).filter(Boolean))];

    dateFilter.innerHTML = '<option value=\"\">All dates</option>';
    neighbourhoodFilter.innerHTML = '<option value=\"\">All neighbourhoods</option>';

    preferredDates.forEach(date => {
      if (dates.includes(date)) {
        const option = document.createElement('option');
        option.value = date;
        option.textContent = date;
        dateFilter.appendChild(option);
      }
    });

    dates
      .filter(date => !preferredDates.includes(date))
      .sort()
      .forEach(date => {
        const option = document.createElement('option');
        option.value = date;
        option.textContent = date;
        dateFilter.appendChild(option);
      });

    preferredNeighbourhoods.forEach(neighbourhood => {
      if (neighbourhoods.includes(neighbourhood)) {
        const option = document.createElement('option');
        option.value = neighbourhood;
        option.textContent = neighbourhood;
        neighbourhoodFilter.appendChild(option);
      }
    });

    neighbourhoods
      .filter(n => !preferredNeighbourhoods.includes(n))
      .sort()
      .forEach(neighbourhood => {
        const option = document.createElement('option');
        option.value = neighbourhood;
        option.textContent = neighbourhood;
        neighbourhoodFilter.appendChild(option);
      });
  }

  function getInfoContent(walk) {
    const dateTime = [
  formatDate(walk.date),
  formatTime(walk.time)
].filter(Boolean).join(' • ');
    const linkHtml = walk.walk_url
      ? `<div style="margin-top:8px;"><a href="${escapeHtml(walk.walk_url)}" target="_blank" rel="noopener noreferrer">View walk page</a></div>`
      : '';

    return `
      <div style="max-width:260px; line-height:1.45; font-family:Arial, sans-serif;">
        <div style="font-weight:700; font-size:16px; margin-bottom:6px;">${escapeHtml(walk.walk_name)}</div>
        ${dateTime ? `<div style="margin-bottom:6px;">${escapeHtml(dateTime)}</div>` : ''}
        ${linkHtml}
      </div>
    `;
  }

  function clearMarkers() {
    for (const markerEntry of markers) {
      markerEntry.marker.setMap(null);
    }
    markers = [];
  }

  function highlightRow(walkId) {
    activeRowId = walkId;
    document.querySelectorAll('tbody tr').forEach(tr => {
      tr.classList.toggle('active-row', tr.dataset.id === walkId);
    });
  }

  function openWalkOnMap(walkId) {
    const walk = filteredWalks.find(w => w.id === walkId) || allWalks.find(w => w.id === walkId);
    if (!walk) return;

    const markerEntry = markers.find(m => m.walkId === walkId);
    if (!markerEntry) return;

    map.panTo({ lat: walk.lat, lng: walk.lng });
    map.setZoom(14);
    infoWindow.setContent(getInfoContent(walk));
    infoWindow.open({ map, anchor: markerEntry.marker });
    highlightRow(walkId);

    const row = document.querySelector(`tbody tr[data-id="${CSS.escape(walkId)}"]`);
    if (row) {
      row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  function renderMarkers(walks) {
    clearMarkers();

    walks.forEach(walk => {
      const marker = new google.maps.Marker({
        position: { lat: walk.lat, lng: walk.lng },
        map: map,
        title: walk.walk_name
      });

      marker.addListener('click', () => {
        infoWindow.setContent(getInfoContent(walk));
        infoWindow.open({ map, anchor: marker });
        highlightRow(walk.id);
      });

      markers.push({ walkId: walk.id, marker });
    });

    if (walks.length) {
      const bounds = new google.maps.LatLngBounds();
      walks.forEach(walk => bounds.extend({ lat: walk.lat, lng: walk.lng }));
      map.fitBounds(bounds);

      google.maps.event.addListenerOnce(map, 'bounds_changed', () => {
        if (map.getZoom() > 14) map.setZoom(14);
      });
    }
  }

  function renderTable(walks) {
    tableBody.innerHTML = '';
    mobileCards.innerHTML = '';

    if (!walks.length) {
      emptyTable.style.display = 'block';
      return;
    }

    emptyTable.style.display = 'none';

    walks.forEach(walk => {
      const row = document.createElement('tr');
      row.dataset.id = walk.id;
      row.innerHTML = `
        <td><button class="walk-link" type="button">${escapeHtml(walk.walk_name)}</button></td>
        <td>${escapeHtml(formatDate(walk.date))}</td>
        <td>${escapeHtml(formatTime(walk.time))}</td>
        <td>${escapeHtml(walk.neighbourhood)}</td>
        <td>${walk.walk_url ? `<a href="${escapeHtml(walk.walk_url)}" target="_blank" rel="noopener noreferrer">Open</a>` : '—'}</td>
      `;

      row.querySelector('.walk-link').addEventListener('click', () => openWalkOnMap(walk.id));
      tableBody.appendChild(row);

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h3><button class="walk-link" type="button">${escapeHtml(walk.walk_name)}</button></h3>
        <p><strong>Date:</strong> ${escapeHtml(formatDate(walk.date) || '—')}</p>
        <p><strong>Time:</strong> ${escapeHtml(formatTime(walk.time) || '—')}</p>
        <p><strong>Neighbourhood:</strong> ${escapeHtml(walk.neighbourhood || '—')}</p>
        <p><strong>Walk Page:</strong> ${walk.walk_url ? `<a href="${escapeHtml(walk.walk_url)}" target="_blank" rel="noopener noreferrer">Open</a>` : '—'}</p>
      `;
      card.querySelector('.walk-link').addEventListener('click', () => openWalkOnMap(walk.id));
      mobileCards.appendChild(card);
    });
  }

  function applyFilters() {
    const searchValue = searchInput.value.trim().toLowerCase();
    const dateValue = dateFilter.value;
    const neighbourhoodValue = neighbourhoodFilter.value;

    filteredWalks = allWalks.filter(walk => {
      const matchesSearch = !searchValue || walk.walk_name.toLowerCase().includes(searchValue);
      const matchesDate = !dateValue || walk.date === dateValue;
      const matchesNeighbourhood = !neighbourhoodValue || walk.neighbourhood === neighbourhoodValue;
      return matchesSearch && matchesDate && matchesNeighbourhood;
    });

    resultCountEl.textContent = `${filteredWalks.length} walk${filteredWalks.length === 1 ? '' : 's'}`;
    renderMarkers(filteredWalks);
    renderTable(filteredWalks);
  }

  function resetFilters() {
    searchInput.value = '';
    dateFilter.value = '';
    neighbourhoodFilter.value = '';
    applyFilters();
  }

  async function loadWalks() {
    statusEl.textContent = 'Loading walks...';

    try {
      const response = await fetch(DATA_URL, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const raw = await response.json();
      allWalks = raw.map(normalizeWalk).filter(isValidWalk);

      populateFilterOptions();
      filteredWalks = [...allWalks];
      renderMarkers(filteredWalks);
      renderTable(filteredWalks);
      resultCountEl.textContent = `${filteredWalks.length} walk${filteredWalks.length === 1 ? '' : 's'}`;
      statusEl.textContent = `${allWalks.length} walk${allWalks.length === 1 ? '' : 's'} loaded.`;
    } catch (error) {
      console.error(error);
      statusEl.textContent = 'Could not load walk data. Check your Apps Script URL and sharing settings.';
    }
  }

  async function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 43.6532, lng: -79.3832 },
      zoom: 11,
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: true
    });

    infoWindow = new google.maps.InfoWindow();
    await loadWalks();
  }

  searchInput.addEventListener('input', applyFilters);
  dateFilter.addEventListener('change', applyFilters);
  neighbourhoodFilter.addEventListener('change', applyFilters);
  resetBtn.addEventListener('click', resetFilters);
  showAllBtn.addEventListener('click', () => {
    filteredWalks = [...allWalks];
    renderMarkers(filteredWalks);
    renderTable(filteredWalks);
    resultCountEl.textContent = `${filteredWalks.length} walk${filteredWalks.length === 1 ? '' : 's'}`;
    statusEl.textContent = `${allWalks.length} walk${allWalks.length === 1 ? '' : 's'} loaded.`;
  });

  window.initMap = initMap;
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAO0OrBnbW_lnszGr6N8rojaJ1CWuaWd8M&callback=initMap"></script>
</body>
</html>
